<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Customer Form</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    body { font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif; margin: 2rem; }
    form { max-width: 560px; display: grid; gap: 12px; }
    label { font-weight: 600; }
    input, textarea, button, select { padding: 10px; font-size: 16px; width: 100%; }
    .flash { padding: 10px; border-radius: 6px; margin-bottom: 12px; }
    .flash.error { background: #ffe5e5; color: #9b1c1c; }
    .flash.success { background: #e6ffed; color: #03543f; }
  </style>
</head>
<body>
  <h1>Customer Purchase Form</h1>

  <!-- Flash messages -->
  {% with messages = get_flashed_messages(with_categories=true) %}
    {% if messages %}
      {% for category, msg in messages %}
        <div class="flash {{ category }}">{{ msg }}</div>
      {% endfor %}
    {% endif %}
  {% endwith %}

  <form action="{{ url_for('submit') }}" method="post" novalidate>
    <div>
      <label for="firstName">First name *</label>
      <input id="firstName" name="firstName" type="text" required />
    </div>

    <div>
      <label for="lastName">Last name *</label>
      <input id="lastName" name="lastName" type="text" required />
    </div>

    <div>
      <label for="email">Email</label>
      <input id="email" name="email" type="email" />
    </div>

    <div>
      <label for="phone">Phone</label>
      <input id="phone" name="phone" type="text" />
    </div>

    <!-- Category as dropdown -->
    <div>
      <label for="category">Category *</label>
      <select id="category" name="category" required>
        <option value="" disabled selected>Select a category</option>
        <option value="Electronics">Electronics</option>
        <option value="Clothing">Clothing</option>
        <option value="Home Essentials">Home Essentials</option>
      </select>
    </div>

    <!-- Product label as dropdown (dependent on Category) -->
    <div>
      <label for="product">Product *</label>
      <select id="product" name="product" required disabled>
        <option value="" disabled selected>Select a product</option>
      </select>
    </div>

    <div>
      <label for="price">Price *</label>
      <input id="price" name="price" type="number" step="0.01" min="0" required />
    </div>

    <button type="submit">Submit</button>
  </form>

  <script>
    // Map: Category -> Products
    const CATEGORY_PRODUCTS = {
      'Electronics': [
        'Smartphone',
        'Laptop',
        'Headphones',
        'Smartwatch',
        'Bluetooth Speaker'
      ],
      'Clothing': [
        'T-Shirt',
        'Jeans',
        'Jacket',
        'Dress',
        'Sneakers'
      ],
      'Home Essentials': [
        'Vacuum Cleaner',
        'Air Purifier',
        'Cookware Set',
        'Bedsheet',
        'LED Bulb (Pack of 4)'
      ]
    };

    const categoryEl = document.getElementById('category');
    const productEl  = document.getElementById('product');

    function resetProductDropdown() {
      productEl.innerHTML = '<option value="" disabled selected>Select a product</option>';
      productEl.disabled = true;
    }

    function populateProducts(category) {
      resetProductDropdown();
      const products = CATEGORY_PRODUCTS[category] || [];
      products.forEach(p => {
        const opt = document.createElement('option');
        opt.value = p;
        opt.textContent = p;
        productEl.appendChild(opt);
      });
      productEl.disabled = products.length === 0;
    }

    // Initialize (in case of server-side repopulation later)
    resetProductDropdown();

    // When category changes, update product list
    categoryEl.addEventListener('change', (e) => {
      const cat = e.target.value;
      populateProducts(cat);
    });
  </script>
</body>
</html>
